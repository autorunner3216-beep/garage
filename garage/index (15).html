<!DOCTYPE html><!-- build:2026-03-13 -->
<html lang="ja">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Garage SMB Board v6</title><style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060b14; color: #e2e8f0; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0f1a; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }
  
    /* ── ゲージ共通 ── */
    @keyframes slide {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* tier1: レインボー — 6秒でゆったり流れる */
    .rainbow-bar {
      background: linear-gradient(90deg,#f87171,#fb923c,#facc15,#4ade80,#60a5fa,#c084fc,#f87171) !important;
      background-size: 300% 100% !important;
      animation: slide 6s linear infinite;
    }
    .rainbow-text {
      background: linear-gradient(90deg,#f87171,#fb923c,#facc15,#4ade80,#60a5fa,#c084fc,#f87171);
      background-size: 300% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: slide 6s linear infinite;
    }
    @keyframes clearPulse {
      0%,100% { box-shadow: 0 0 4px #c084fc18; }
      50%      { box-shadow: 0 0 10px #c084fc33; }
    }
    .clear-pulse { animation: clearPulse 4s ease-in-out infinite; }

    /* tier2: +50万 エメラルド */
    @keyframes emeraldBreathe {
      0%,100% { filter: brightness(0.9); }
      50%      { filter: brightness(1.15); }
    }
    .emerald-pulse-bar {
      background: linear-gradient(90deg,#064e3b,#059669,#34d399,#6ee7b7,#34d399,#059669) !important;
      background-size: 300% 100% !important;
      animation: slide 4.5s ease-in-out infinite, emeraldBreathe 4.5s ease-in-out infinite;
    }
    .emerald-text {
      background: linear-gradient(90deg,#064e3b,#059669,#34d399,#6ee7b7,#34d399,#059669);
      background-size: 300% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: slide 4.5s ease-in-out infinite;
    }
    @keyframes emeraldPulse {
      0%,100% { box-shadow: 0 0 6px #10b98120; }
      50%      { box-shadow: 0 0 14px #34d39930; }
    }
    .emerald-pulse { animation: emeraldPulse 4.5s ease-in-out infinite; }

        /* tier2: +50万 ゴールド — ほぼ静止、ごく微かな呼吸 */
    @keyframes goldBreathe {
      0%,100% { filter: brightness(0.95); }
      50%      { filter: brightness(1.1); }
    }
    .gold-pulse-bar {
      background: linear-gradient(90deg,#92400e,#d97706,#fbbf24,#fde68a,#fbbf24,#d97706) !important;
      background-size: 300% 100% !important;
      animation: slide 5s ease-in-out infinite, goldBreathe 5s ease-in-out infinite;
    }
    .gold-text {
      background: linear-gradient(90deg,#92400e,#d97706,#fbbf24,#fde68a,#fbbf24,#d97706);
      background-size: 300% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: slide 5s ease-in-out infinite;
    }
    @keyframes goldPulse {
      0%,100% { box-shadow: 0 0 6px #f59e0b22; }
      50%      { box-shadow: 0 0 12px #fbbf2433; }
    }
    .gold-pulse { animation: goldPulse 5s ease-in-out infinite; }

    /* tier3: +100万 パープル — 2.5秒、落ち着き */
    @keyframes purpleBreathe {
      0%,100% { filter: brightness(0.9); }
      50%      { filter: brightness(1.15); }
    }
    .purple-pulse-bar {
      background: linear-gradient(90deg,#2e1065,#6d28d9,#a855f7,#c084fc,#a855f7,#6d28d9) !important;
      background-size: 300% 100% !important;
      animation: slide 2.5s ease-in-out infinite, purpleBreathe 2.5s ease-in-out infinite;
    }
    .purple-text {
      background: linear-gradient(90deg,#2e1065,#6d28d9,#a855f7,#c084fc,#a855f7,#6d28d9);
      background-size: 300% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: slide 2.5s ease-in-out infinite;
    }
    @keyframes zapPulse {
      0%,100% { box-shadow: 0 0 7px #7c3aed33; }
      50%      { box-shadow: 0 0 16px #a855f744; }
    }
    .purple-pulse { animation: zapPulse 2.5s ease-in-out infinite; }

    /* tier4: +150万 シアン — 2秒、涼しい波 */
    @keyframes iceBreathe {
      0%,100% { filter: brightness(0.9) saturate(0.9); }
      50%      { filter: brightness(1.2) saturate(1.2); }
    }
    .cyan-pulse-bar {
      background: linear-gradient(90deg,#0c4a6e,#0284c7,#22d3ee,#7dd3fc,#22d3ee,#0284c7) !important;
      background-size: 300% 100% !important;
      animation: slide 2s ease-in-out infinite, iceBreathe 2s ease-in-out infinite;
    }
    .cyan-text {
      background: linear-gradient(90deg,#0c4a6e,#0284c7,#22d3ee,#7dd3fc,#22d3ee,#0284c7);
      background-size: 300% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: slide 2s ease-in-out infinite;
    }
    @keyframes icePulse {
      0%,100% { box-shadow: 0 0 8px #06b6d433; }
      50%      { box-shadow: 0 0 20px #22d3ee55; }
    }
    .cyan-pulse { animation: icePulse 2s ease-in-out infinite; }

    /* tier5: +200万 炎 — 1.4秒、明滅やや強め */
    @keyframes fireBreathe {
      0%,100% { filter: brightness(0.85) saturate(1); }
      40%      { filter: brightness(1.25) saturate(1.4); }
      70%      { filter: brightness(1.1) saturate(1.2); }
    }
    .fire-pulse-bar {
      background: linear-gradient(90deg,#7f1d1d,#dc2626,#ef4444,#f97316,#fbbf24,#f97316,#dc2626) !important;
      background-size: 300% 100% !important;
      animation: slide 1.4s linear infinite, fireBreathe 1.4s ease-in-out infinite;
    }
    .fire-text {
      background: linear-gradient(90deg,#7f1d1d,#dc2626,#ef4444,#f97316,#fbbf24,#f97316,#dc2626);
      background-size: 300% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: slide 1.4s linear infinite;
    }
    @keyframes firePulse {
      0%,100% { box-shadow: 0 0 10px #ef444433; }
      50%      { box-shadow: 0 0 24px #f9731655; }
    }
    .fire-pulse { animation: firePulse 1.4s ease-in-out infinite; }

    /* tier6: +250万 白銀 — 1秒、ビリビリ鋭い点滅 */
    @keyframes godBreathe {
      0%   { filter: brightness(0.88); }
      35%  { filter: brightness(0.88); }
      52%  { filter: brightness(1.18); }
      68%  { filter: brightness(0.88); }
      100% { filter: brightness(0.88); }
    }
    .white-pulse-bar {
      background: linear-gradient(90deg,#1e293b,#475569,#94a3b8,#f1f5f9,#ffffff,#f1f5f9,#94a3b8) !important;
      background-size: 300% 100% !important;
      animation: slide 5s ease-in-out infinite, godBreathe 4s ease-in-out infinite;
    }
    .white-text {
      background: linear-gradient(90deg,#475569,#94a3b8,#e2e8f0,#ffffff,#e2e8f0,#94a3b8);
      background-size: 300% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: slide 1s linear infinite;
    }
    @keyframes godPulse {
      0%   { box-shadow: 0 0 2px #94a3b80a; }
      35%  { box-shadow: 0 0 2px #94a3b80a; }
      52%  { box-shadow: 0 0 18px #e2e8f055, 0 0 36px #f1f5f920; }
      68%  { box-shadow: 0 0 2px #94a3b80a; }
      100% { box-shadow: 0 0 2px #94a3b80a; }
    }
    .white-pulse { animation: godPulse 4s ease-in-out infinite; }

    /* tier7: +300万 MYTHIC — 0.5秒、全色爆発フラッシュ */
    @keyframes mythicBreathe {
      0%   { filter: hue-rotate(0deg)   brightness(0.85); }
      32%  { filter: hue-rotate(60deg)  brightness(0.85); }
      50%  { filter: hue-rotate(120deg) brightness(2.2); }
      68%  { filter: hue-rotate(180deg) brightness(0.85); }
      100% { filter: hue-rotate(240deg) brightness(0.85); }
    }
    @keyframes mythicPulse {
      0%   { box-shadow: 0 0 2px #f8717108; }
      32%  { box-shadow: 0 0 2px #f8717108; }
      48%  { box-shadow: 0 0 40px #4ade80bb, 0 0 80px #60a5fa55, 0 0 120px #4ade8022; }
      54%  { box-shadow: 0 0 50px #c084fccc, 0 0 100px #f8717166, 0 0 150px #c084fc22; }
      72%  { box-shadow: 0 0 2px #60a5fa08; }
      100% { box-shadow: 0 0 2px #f8717108; }
    }
    .mythic-pulse { animation: mythicPulse 3.5s ease-in-out infinite; }
      @keyframes float-in {
        from { opacity:0; transform: translateY(-12px) scale(0.95); }
        to   { opacity:1; transform: translateY(0) scale(1); }
      }

  <script>
  const firebaseConfig = {
    apiKey: "AIzaSyDAyqKSD4oxh3PqZW1UIjuqL73Ejp33_E0",
    authDomain: "garage-armb-board.firebaseapp.com",
    databaseURL: "https://garage-armb-board-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "garage-armb-board",
    storageBucket: "garage-armb-board.firebasestorage.app",
    messagingSenderId: "430667841584",
    appId: "1:430667841584:web:81c17b57d4c6493875edf5"
  };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const _fbTimers = {};
    window.fbSet = function(key, value, delay) {
      delay = delay || 300;
      clearTimeout(_fbTimers[key]);
      _fbTimers[key] = setTimeout(function() {
        db.ref('garage/' + key).set(value);
      }, delay);
    };
    window.fbOn = function(key, callback) {
      db.ref('garage/' + key).on('value', function(snap) {
        callback(snap.val());
      });
    };
    window.fbOff = function(key) {
      db.ref('garage/' + key).off();
    };
    console.log('[Firebase] 初期化完了');
  </script>

  <!-- Firebase接続状態インジケーター -->
  <div id="fb-status" style="position:fixed;bottom:12px;right:12px;z-index:9998;
    background:rgba(6,182,212,0.15);border:1px solid rgba(6,182,212,0.4);
    border-radius:20px;padding:4px 12px;font-size:11px;color:#06b6d4;
    font-family:monospace;letter-spacing:1px;transition:all .5s;pointer-events:none;">
    ⚡ 同期接続中...
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        if (typeof firebase === 'undefined') return;
        var connRef = firebase.database().ref('.info/connected');
        var el = document.getElementById('fb-status');
        connRef.on('value', function(snap) {
          if (!el) return;
          if (snap.val() === true) {
            el.style.color = '#4ade80';
            el.style.background = 'rgba(74,222,128,0.1)';
            el.style.borderColor = 'rgba(74,222,128,0.4)';
            el.textContent = '🟢 リアルタイム同期 ON';
            setTimeout(function(){ el.style.opacity='0.4'; }, 3000);
          } else {
            el.style.color = '#f87171';
            el.style.background = 'rgba(248,113,113,0.1)';
            el.style.borderColor = 'rgba(248,113,113,0.4)';
            el.style.opacity = '1';
            el.textContent = '🔴 オフライン';
          }
        });
      }, 1000);
    });
  </script>

        var missing = [];
        if (!draft.owner  || !draft.owner.trim())    missing.push("オーナー名");
        if (!draft.plate  || !draft.plate.trim())    missing.push("ナンバープレート");
        if (!draft.carModel || !draft.carModel.trim()) missing.push("車種");
        if (!draft.inDate)  missing.push("入庫日");
        if (!draft.outDate) missing.push("完成予定日");
        if (!draft.type)    missing.push("修理種別");
        if (missing.length > 0) {
          setSaveError("【必須項目】" + missing.join(" / "));
          return;
        }
        setSaveError("");
